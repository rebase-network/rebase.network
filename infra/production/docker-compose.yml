name: rebase-production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rebase}
      POSTGRES_USER: ${POSTGRES_USER:-rebase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in infra/production/server.env}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55433}:5432"
    volumes:
      - rebase-production-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8788}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rebase}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rebase}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in infra/production/server.env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://api.rebase.network}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://rebase.network,https://rebase.community,https://admin.rebase.network}
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-admin@rebase.network}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-change-me-before-bootstrap}
      DEV_ADMIN_NAME: ${DEV_ADMIN_NAME:-Rebase Super Admin}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-rebase-media}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_DEV_USE_WRANGLER: ${R2_DEV_USE_WRANGLER:-true}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8788}:8788"
    volumes:
      # Mount the Wrangler profile so production can use the CLI-backed R2 mode
      # until dedicated S3 credentials are provisioned for the bucket.
      - ${WRANGLER_CONFIG_DIR:-/home/rebase/.config/.wrangler}:/root/.config/.wrangler
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8788/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:?set CLOUDFLARED_TUNNEL_TOKEN in infra/production/server.env}

volumes:
  rebase-production-postgres:
