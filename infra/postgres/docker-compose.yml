services:
  postgres:
    image: postgres:16-alpine
    container_name: rebase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rebase
      POSTGRES_USER: rebase
      POSTGRES_PASSWORD: rebase
    ports:
      - "55433:5432"
    volumes:
      - rebase-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebase -d rebase"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rebase-postgres-data:
